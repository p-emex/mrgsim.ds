url: https://kylebaron.github.io/mrgsim.ds/
template:
  bootstrap: 5
reference:
- title: Landing page
  contents: 
  - mrgsim.ds
- title: Read or load models
  desc: Functions to read models configured for use with `mrgsim_ds()`.
  contents:
  - mread_ds
  - mread_cache_ds
  - mcode_ds
  - modlib_ds
  - house_ds
- title: Generate Apache Arrow dataset-backed simulation outputs
  desc: Simulate and write output to disk.
  contents:
  - mrgsim_ds
  - as_mrgsim_ds
- title: S3 Methods
  desc: Work with `mrgsim_ds()` output.
  contents:
  - mrgsimsds-methods
  - print.mrgsimsds
  - filter.mrgsimsds
  - select.mrgsimsds
  - mutate.mrgsimsds
  - summarise.mrgsimsds
  - group_by.mrgsimsds
  - arrange.mrgsimsds
  - rename.mrgsimsds
  - distinct.mrgsimsds
  - relocate.mrgsimsds
  - count.mrgsimsds
  - pull.mrgsimsds
- title: Move or rename outputs
  contents:
  - move_ds
  - read_ds
  - save_ds
  - rename_ds
  - files_ds
- title: Manage or query ownership
  desc: |
    This applies to ownership parquet files holding simulation outputs for the
    duration of the working R session.
  contents:
  - ownership
  - check_ownership
  - list_ownership
  - take_ownership
  - disown
  - copy_ds
- title: Work with lists of mrgsimsds objects
  desc: Commonly needed after batch simulation in parallel
  contents:
  - reduce_ds
  - refresh_ds
  - gc_ds
  - prune_ds
- title: Manage simulation outputs in `tempdir()`
  contents:
  - list_temp
  - retain_temp
  - purge_temp
- title: Utility functions
  contents:
  - save_process_info
  - is_mrgsimsds
- title: Coerce output to an R object
  contents:
  - as.data.frame.mrgsimsds
  - as_tibble.mrgsimsds
  - collect.mrgsimsds
  - as_arrow_ds
  - as_arrow_table.mrgsimsds
  - as_duckdb_ds


